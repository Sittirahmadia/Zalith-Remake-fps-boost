name: Zalith Remake FPS Boost - Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  BuildDebug:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [ "all", "arm64" ]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build JRE JAR files
        run: |
          chmod +x gradlew
          mkdir -p out
          ./gradlew jre_lwjgl3glfw:build --no-daemon

      - name: Build Debug APK ${{ matrix.arch }}
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assembleDebug -Darch=${{ matrix.arch }}

      - name: Upload Debug APK ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: ZalithRemake-FPSBoost(Debug)-${{ matrix.arch }}
          path: ZalithLauncher/build/outputs/apk/debug/*

  BuildRelease:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [ "all", "arm64" ]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build JRE JAR files
        run: |
          chmod +x gradlew
          mkdir -p out
          ./gradlew jre_lwjgl3glfw:build --no-daemon

      - name: Build Release APK ${{ matrix.arch }}
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assembleRelease -Darch=${{ matrix.arch }} || ./gradlew ZalithLauncher:assembleDebug -Darch=${{ matrix.arch }}

      - name: Upload Release APK ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: ZalithRemake-FPSBoost(Release)-${{ matrix.arch }}
          path: |
            ZalithLauncher/build/outputs/apk/release/*
            ZalithLauncher/build/outputs/apk/debug/*
